spring.application.name=fresh-greens-gateway

# Public ingress (frontends call this service)
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

# Upstream backend service (Spring Boot server app)
app.backend.base-uri=${APP_BACKEND_BASE_URI:http://localhost:8081}

# ---------------------------------------------------------------
# Spring Cloud Gateway 5.x uses prefix:
#   spring.cloud.gateway.server.webflux  (NOT spring.cloud.gateway)
# ---------------------------------------------------------------

# Route all backend API traffic via gateway
spring.cloud.gateway.server.webflux.routes[0].id=backend-api
spring.cloud.gateway.server.webflux.routes[0].uri=${app.backend.base-uri}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/**

# API docs passthrough (Swagger UI)
spring.cloud.gateway.server.webflux.routes[1].id=backend-openapi
spring.cloud.gateway.server.webflux.routes[1].uri=${app.backend.base-uri}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=when-authorized

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO