# =====================================================================
# Fresh Greens e-Market — Application Configuration
# =====================================================================
spring.application.name=fresh-greens

# =====================================================================
# Server Configuration
# =====================================================================
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false

# =====================================================================
# MySQL Datasource (Hibernate auto-manages schema)
# =====================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/fresh_greens_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate DDL — auto-creates and updates tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Connection pool (HikariCP — default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =====================================================================
# Redis Cache + Session Store (Stateful auth)
# =====================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000ms

# Spring Session backed by Redis
spring.session.store-type=redis
spring.session.redis.namespace=freshgreens:session
server.servlet.session.timeout=30m

# Cache configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.key-prefix=freshgreens:cache:
spring.cache.redis.use-key-prefix=true

# =====================================================================
# Firebase Configuration
# =====================================================================
# Place your Firebase service account JSON in src/main/resources/
app.firebase.config-path=firebase-service-account.json

# =====================================================================
# Razorpay Payment Gateway (Test Keys)
# =====================================================================
# Generate test keys at: https://dashboard.razorpay.com/app/keys (Test Mode)
razorpay.key.id=rzp_test_XXXXXXXXXXXXXX
razorpay.key.secret=YOUR_RAZORPAY_TEST_SECRET
razorpay.webhook.secret=YOUR_RAZORPAY_WEBHOOK_SECRET

# =====================================================================
# File Upload (Product Images — Local Disk)
# =====================================================================
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================================
# Static Resources
# =====================================================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# =====================================================================
# Actuator (Health + Info endpoints only)
# =====================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# =====================================================================
# Logging
# =====================================================================
logging.level.root=INFO
logging.level.com.freshgreens=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
